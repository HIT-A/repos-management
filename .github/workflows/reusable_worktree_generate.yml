name: Reusable Workflow To Update Worktree and Trigger Workflow

on:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: rdme-worktree-generate-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  worktree_update:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Keep workspace aligned with remote main to avoid rebase conflicts later.
          git fetch origin main
          git reset --hard origin/main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: RDME bidirectional autogen (format + sync + warning)
        id: rdme
        continue-on-error: true
        run: |
          # Install Taplo CLI (optional): do not fail the step.
          set +e
          ver="0.10.0"
          arch="$(uname -m)"
          taplo_arch=""
          if [ "$arch" = "x86_64" ]; then taplo_arch="x86_64"; fi
          if [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then taplo_arch="aarch64"; fi
          if [ -n "$taplo_arch" ]; then
            url="https://github.com/tamasfe/taplo/releases/download/${ver}/taplo-linux-${taplo_arch}.gz"
            curl -Ls "$url" | gzip -d > taplo
            chmod +x taplo
            sudo mv taplo /usr/local/bin/taplo
            taplo --version
          else
            echo "Unsupported arch: $arch (skip taplo)"
          fi
          set -e

          SCRIPTS_BASE="https://raw.githubusercontent.com/HIT-A/repos-management/main/scripts"
          curl -Ls -o /tmp/rdme_autogen.py "${SCRIPTS_BASE}/rdme_autogen.py"
          python3 /tmp/rdme_autogen.py \
            --toml readme.toml \
            --readme README.md \
            --converter-url "${SCRIPTS_BASE}/convert_toml_to_readme.py" \
            --reverse-converter-url "${SCRIPTS_BASE}/readme_to_toml.py"

      - name: Commit & push TOML/README changes (main only)
        if: >-
          steps.rdme.outputs.toml_exists == 'true' &&
          github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add readme.toml README.md || true

          if git diff --staged --quiet; then
            echo "No TOML/README changes to commit."
            exit 0
          fi

          # Prevent this automated push from re-triggering workflows.
          git commit -m "ci: bidirectional sync toml <-> README [automated] [skip ci]"

          # Push without rebase. If main moved meanwhile, retry once by
          # resetting to the latest main and re-running RDME.
          set +e
          git push origin HEAD:main
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            exit 0
          fi

          echo "Push failed (rc=$rc). main may have moved; retry once."
          git fetch origin main
          git reset --hard origin/main

          SCRIPTS_BASE="https://raw.githubusercontent.com/HIT-A/repos-management/main/scripts"
          python3 /tmp/rdme_autogen.py \
            --toml readme.toml \
            --readme README.md \
            --converter-url "${SCRIPTS_BASE}/convert_toml_to_readme.py" \
            --reverse-converter-url "${SCRIPTS_BASE}/readme_to_toml.py" || true

          git add readme.toml README.md || true
          if git diff --staged --quiet; then
            echo "No TOML/README changes after retry."
            exit 0
          fi

          git commit -m "ci: bidirectional sync toml <-> README [automated] [skip ci]" || true
          set +e
          git push origin HEAD:main
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "Retry push still failed (rc=$rc). Skip push to avoid blocking." 
            exit 0
          fi

      - name: Fail CI if formatting/generation failed
        if: >-
          steps.rdme.outputs.toml_exists == 'true' &&
          steps.rdme.outcome != 'success'
        run: |
          echo "RDME outcome: ${{ steps.rdme.outcome }}"
          exit 1
